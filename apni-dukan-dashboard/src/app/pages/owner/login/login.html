<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">

  <!-- Background animated circles -->
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>
  <div class="bg-circle circle-3"></div>

  <div class="login-card">

    <!-- Logo Section -->
    <!-- Upgraded Logo Section with Shutter Animation -->
    <div class="text-center mb-4 logo-section">
    <div class="shutter-container">
    <!-- पीछे छिपने वाला असली आइकॉन -->
    <div class="hidden-store-icon">🏪</div>
    <!-- ऊपर उठने वाला शटर (Blinds) -->
    <div class="shutter-door">
      <div class="shutter-line"></div>
      <div class="shutter-line"></div>
      <div class="shutter-line"></div>
      <div class="shutter-line"></div>
    </div>
  </div>
  <h2 class="brand-name animate-fade-in">Apni Dukan</h2>
  <p class="brand-sub animate-fade-in">Owner Dashboard</p>
</div>
    
    <!-- Error Alert -->
    <div *ngIf="error"
         class="alert-error d-flex align-items-center gap-2 mb-3">
      <span>❌</span>
      <span>{{ error }}</span>
    </div>

    <!-- Email Field -->
    <div class="mb-3 input-group-custom">
      <label class="input-label">Email Address</label>
      <div class="input-wrapper">
        <span class="input-icon">📧</span>
        <input type="email"
               class="custom-input"
               placeholder="owner@apnidukan.com"
               [(ngModel)]="email"
               (keyup.enter)="login()">
      </div>
    </div>

    <!-- Password Field -->
    <div class="mb-4 input-group-custom">
      <label class="input-label">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔐</span>
        <input type="password"
               class="custom-input"
               placeholder="••••••••"
               [(ngModel)]="password"
               (keyup.enter)="login()">
      </div>
    </div>

    <!-- Login Button -->
    <button class="btn-login w-100"
            (click)="login()"
            [disabled]="loading"
            [class.loading]="loading">
      <span *ngIf="!loading">🚀 Login to Dashboard</span>
      <span *ngIf="loading" class="d-flex align-items-center justify-content-center gap-2">
        <span class="spinner"></span> Logging in...
      </span>
    </button>

    <!-- Divider -->
    <div class="divider my-3">
      <span>or</span>
    </div>

    <!-- Customer Link -->
    <a href="/store" class="btn-customer w-100 d-block text-center">
      🛍️ Go to Customer Store
    </a>

    <!-- Footer -->
    <p class="text-center mt-4 footer-text">
      🔒 Secure Owner Access Only
    </p>

  </div>
</div>
